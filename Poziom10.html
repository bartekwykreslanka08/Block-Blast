<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 10 - Pattern Lock</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka One', cursive; touch-action: none; user-select: none; }
        body { background: linear-gradient(135deg, #e8effa 0%, #f2f2f2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; overflow: hidden; }

        .captcha-box { background: #ffffff; width: 92%; max-width: 420px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, #4A90E2, #357ABD); color: white; padding: 20px 24px; position: relative; }
        .level-badge { display: inline-block; background: rgba(255, 255, 255, 0.25); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        .header h2 { font-size: 28px; }
        
        /* Mini podpowiedź wzoru */
        .hint-box { position: absolute; top: 20px; right: 24px; width: 45px; height: 45px; background: rgba(255,255,255,0.2); border-radius: 6px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 4px; }
        .hint-dot { background: rgba(255,255,255,0.4); border-radius: 50%; }
        .hint-dot.active { background: #fff; }

        .game-area { background: #fafafa; display: flex; justify-content: center; align-items: center; padding: 40px 0; }
        
        .pattern-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; position: relative; }
        .dot-container { width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; position: relative; }
        .dot { width: 14px; height: 14px; background: #ccc; border-radius: 50%; transition: all 0.2s; position: absolute; pointer-events: none; }
        
        /* Obszar czuły na dotyk dla każdej kropki */
        .touch-target { width: 60px; height: 60px; position: absolute; }
        
        .dot-container.active .dot { transform: scale(1.8); background: #4A90E2; }
        .pattern-grid.error .dot-container.active .dot { background: #e74c3c; }
        .pattern-grid.success .dot-container.active .dot { background: #2ecc71; }

        .footer { padding: 16px 20px; display: flex; justify-content: center; background: #fff; border-top: 1px solid #eee; }
        .btn-verify { background: linear-gradient(135deg, #4A90E2, #357ABD); color: white; border: none; padding: 14px 36px; font-size: 16px; border-radius: 6px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; transition: opacity 0.3s; }
        .btn-verify:disabled { background: #b3cdef; cursor: not-allowed; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="captcha-box">
        <div class="header">
            <span class="level-badge">Level 10</span>
            <h2>Draw the shape</h2>
            <!-- Podpowiedź: Litera L -->
            <div class="hint-box">
                <div class="hint-dot active"></div> <div class="hint-dot"></div> <div class="hint-dot"></div>
                <div class="hint-dot active"></div> <div class="hint-dot"></div> <div class="hint-dot"></div>
                <div class="hint-dot active"></div> <div class="hint-dot active"></div> <div class="hint-dot active"></div>
            </div>
        </div>
        <div class="game-area">
            <div class="pattern-grid" id="patternGrid">
                <!-- Generowane przez JS -->
            </div>
        </div>
        <div class="footer">
            <button class="btn-verify" id="verifyBtn" onclick="finishGame()" disabled>Complete</button>
        </div>
    </div>

    <script>
        const grid = document.getElementById('patternGrid');
        const verifyBtn = document.getElementById('verifyBtn');
        
        // Poprawny wzór "L": indeksy 0, 3, 6, 7, 8
        const targetPattern = [0, 3, 6, 7, 8]; 
        let currentPattern = [];
        let isDrawing = false;
        let isDone = false;
        let dots = [];

        // Generowanie siatki
        for(let i = 0; i < 9; i++) {
            let container = document.createElement('div');
            container.className = 'dot-container';
            container.innerHTML = `<div class="dot"></div><div class="touch-target" data-id="${i}"></div>`;
            grid.appendChild(container);
            dots.push(container);
        }

        function activateDot(id) {
            if (!currentPattern.includes(id)) {
                currentPattern.push(id);
                dots[id].classList.add('active');
            }
        }

        function startDraw(e) {
            if (isDone) return;
            isDrawing = true;
            grid.classList.remove('error');
            currentPattern = [];
            dots.forEach(d => d.classList.remove('active'));
            handleMove(e);
        }

        function handleMove(e) {
            if (!isDrawing) return;
            let clientX = e.clientX || (e.touches && e.touches[0].clientX);
            let clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            // Pobranie elementu pod wskaźnikiem
            let element = document.elementFromPoint(clientX, clientY);
            if (element && element.classList.contains('touch-target')) {
                let id = parseInt(element.getAttribute('data-id'));
                activateDot(id);
            }
        }

        function endDraw() {
            if (!isDrawing || isDone) return;
            isDrawing = false;
            
            // Sprawdzenie wzoru
            if (currentPattern.join(',') === targetPattern.join(',')) {
                isDone = true;
                grid.classList.add('success');
                verifyBtn.disabled = false;
            } else if (currentPattern.length > 0) {
                grid.classList.add('error');
                setTimeout(() => {
                    if (!isDrawing) {
                        grid.classList.remove('error');
                        dots.forEach(d => d.classList.remove('active'));
                        currentPattern = [];
                    }
                }, 500);
            }
        }

        // Rejestracja eventów
        grid.addEventListener('mousedown', startDraw);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', endDraw);

        grid.addEventListener('touchstart', startDraw);
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', endDraw);

        function finishGame() {
            alert("GRATULACJE! Ukończyłeś wszystkie poziomy!");
        }
    </script>
</body>
</html>
