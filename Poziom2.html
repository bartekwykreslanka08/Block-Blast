<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 2 - Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka One', cursive; }
        body { background: linear-gradient(135deg, #e8effa 0%, #f2f2f2 100%); display: flex; justify-content: center; align-items: center; height: 100vh; color: #333; }

        .captcha-box { background: #ffffff; width: 420px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; }
        
        .header { background: linear-gradient(135deg, #4A90E2, #357ABD); color: white; padding: 24px 24px; }
        .level-badge { display: inline-block; background: rgba(255, 255, 255, 0.25); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase; }
        .header p { font-size: 15px; margin-bottom: 6px; font-weight: normal; letter-spacing: 0.5px; }
        .header h2 { font-size: 32px; letter-spacing: 1px; }

        .game-wrapper { padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 124px); gap: 6px; background-color: #e0e0e0; border-radius: 8px; overflow: hidden; }
        .cell { background: #fff; display: flex; justify-content: center; align-items: center; font-size: 75px; cursor: pointer; user-select: none; transition: background 0.2s ease; }
        .cell:hover { background: #f0f4f8; }
        
        .x { color: #555; line-height: 1; animation: popIn 0.2s ease-out; }
        .o { color: #4A90E2; line-height: 1; animation: popIn 0.2s ease-out; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .status-msg { text-align: center; font-size: 15px; padding: 12px 16px 0 16px; color: #d93025; display: none; }
        .footer { padding: 16px 20px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; margin-top: 8px; background: #fafafa; }
        .footer-icons button { background: none; border: none; cursor: pointer; font-size: 26px; color: #888; margin-right: 12px; transition: color 0.2s, transform 0.2s; }
        .footer-icons button:hover { color: #4A90E2; transform: rotate(45deg); }

        .btn-verify { background: linear-gradient(135deg, #4A90E2, #357ABD); color: white; border: none; padding: 14px 36px; font-size: 16px; border-radius: 6px; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3); }
        .btn-verify:disabled { background: #b3cdef; cursor: not-allowed; box-shadow: none; transform: none; }
        .btn-verify:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(74, 144, 226, 0.4); }
    </style>
</head>
<body>
    <div class="captcha-box">
        <div class="header">
            <span class="level-badge">Level 2</span>
            <p>Beat the robot in</p>
            <h2>Tic Tac Toe</h2>
        </div>
        <div class="status-msg" id="msg">Draw! Reset the board.</div>
        <div class="game-wrapper">
            <div class="grid" id="board">
                <div class="cell" onclick="makeMove(0)"></div>
                <div class="cell" onclick="makeMove(1)"></div>
                <div class="cell" onclick="makeMove(2)"></div>
                <div class="cell" onclick="makeMove(3)"></div>
                <div class="cell" onclick="makeMove(4)"></div>
                <div class="cell" onclick="makeMove(5)"></div>
                <div class="cell" onclick="makeMove(6)"></div>
                <div class="cell" onclick="makeMove(7)"></div>
                <div class="cell" onclick="makeMove(8)"></div>
            </div>
        </div>
        <div class="footer">
            <div class="footer-icons">
                <button onclick="resetGame()" title="Reset the board">↻</button>
            </div>
            <button class="btn-verify" id="verifyBtn" onclick="goToNextLevel()" disabled>Verify</button>
        </div>
    </div>
    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;
        const msgDiv = document.getElementById('msg');
        const verifyBtn = document.getElementById('verifyBtn');
        const winConditions = [[0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]];

        function makeMove(index) {
            if (board[index] === "" && gameActive) {
                board[index] = "X"; updateBoard();
                if (checkWin("X")) { endGame("Victory! You can proceed.", "#0f9d58"); verifyBtn.disabled = false; return; }
                if (!board.includes("")) { endGame("Draw! Try again.", "#d93025"); return; }
                gameActive = false; setTimeout(botMove, 400); 
            }
        }
        function botMove() {
            let emptyCells = [];
            for (let i = 0; i < board.length; i++) { if (board[i] === "") emptyCells.push(i); }
            if (emptyCells.length > 0) {
                let randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomIndex] = "O"; updateBoard();
                if (checkWin("O")) { endGame("Bot won! Reset the board (↻).", "#d93025"); return; }
                if (!board.includes("")) { endGame("Draw! Reset the board (↻).", "#d93025"); return; }
                gameActive = true; 
            }
        }
        function checkWin(player) { return winConditions.some(condition => { return condition.every(index => board[index] === player); }); }
        function updateBoard() {
            const cells = document.querySelectorAll('.cell');
            for (let i = 0; i < board.length; i++) { cells[i].innerHTML = board[i] === "X" ? '<span class="x">✕</span>' : (board[i] === "O" ? '<span class="o">◯</span>' : ''); }
        }
        function endGame(text, color) { gameActive = false; msgDiv.style.display = "block"; msgDiv.style.color = color; msgDiv.innerText = text; }
        function resetGame() { board = ["", "", "", "", "", "", "", "", ""]; gameActive = true; msgDiv.style.display = "none"; verifyBtn.disabled = true; updateBoard(); }
        function goToNextLevel() { window.location.href = 'Poziom3.html'; }
    </script>
</body>
</html>
