<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poziom 1 - Wybierz Warszawę</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka', sans-serif; }
        body { 
            background-color: #f2f2f2; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: #333;
        }

        .captcha-box {
            background: #ffffff;
            width: 400px;
            border: 1px solid #cecece;
            border-radius: 3px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        .header {
            background-color: #4A90E2;
            color: white;
            padding: 24px;
        }
        .header p { font-size: 14px; margin-bottom: 4px; font-weight: 400; }
        .header h2 { font-size: 28px; font-weight: 600; letter-spacing: 0.5px; }

        .grid-container { padding: 8px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px; /* Wąskie odstępy jak w prawdziwym recaptcha */
        }

        .img-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1; /* Idealne kwadraty */
            cursor: pointer;
            overflow: hidden;
            background: #fff;
        }
        .img-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.15s ease-in-out;
        }

        /* Stylizacja po zaznaczeniu zdjęcia - jak w Google */
        .img-item.selected img {
            transform: scale(0.82);
        }
        .img-item.selected {
            background-color: #4A90E2;
        }
        .img-item .checkmark {
            position: absolute;
            top: 4px; right: 4px;
            width: 24px; height: 24px;
            background-color: #4A90E2;
            color: white;
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 0 4px rgba(0,0,0,0.3);
            z-index: 10;
        }
        .img-item.selected .checkmark { display: flex; }

        .footer {
            padding: 12px 16px;
            border-top: 1px solid #dfdfdf;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-icons button {
            background: none; border: none; cursor: pointer;
            font-size: 22px; color: #737373; margin-right: 12px;
            transition: 0.2s;
        }
        .footer-icons button:hover { color: #333; }

        .btn-verify {
            background-color: #4A90E2;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-verify:hover { background-color: #357ABD; }
        
        .error-msg {
            color: #d93025; font-size: 13px; font-weight: 500; 
            padding: 0 16px 8px 16px; display: none;
        }
    </style>
</head>
<body>

    <div class="captcha-box">
        <div class="header">
            <p>Wybierz wszystkie zdjęcia, na których jest</p>
            <h2>Warszawa</h2>
        </div>
        
        <div class="grid-container">
            <div class="grid">
                <div class="img-item" data-id="1" onclick="toggleSelect(this)"><img src="Poziom1zdjecie1.jpg" alt="1"><div class="checkmark">✓</div></div>
                <div class="img-item" data-id="2" onclick="toggleSelect(this)"><img src="Poziom1zdjecie2.jpg" alt="2"><div class="checkmark">✓</div></div>
                <div class="img-item" data-id="3" onclick="toggleSelect(this)"><img src="Poziom1zdjecie3.jpg" alt="3"><div class="checkmark">✓</div></div>
                <div class="img-item" data-id="4" onclick="toggleSelect(this)"><img src="Poziom1zdjecie4.jpg" alt="4"><div class="checkmark">✓</div></div>
                <div class="img-item" data-id="5" onclick="toggleSelect(this)"><img src="Poziom1zdjecie5.jpg" alt="5"><div class="checkmark">✓</div></div>
                <div class="img-item" data-id="6" onclick="toggleSelect(this)"><img src="Poziom1zdjecie6.jpg" alt="6"><div class="checkmark">✓</div></div>
                <div class="img-item" data-id="7" onclick="toggleSelect(this)"><img src="Poziom1zdjecie7.jpg" alt="7"><div class="checkmark">✓</div></div>
                <div class="img-item" data-id="8" onclick="toggleSelect(this)"><img src="Poziom1zdjecie8.jpg" alt="8"><div class="checkmark">✓</div></div>
                <div class="img-item" data-id="9" onclick="toggleSelect(this)"><img src="Poziom1zdjecie9.jpg" alt="9"><div class="checkmark">✓</div></div>
            </div>
        </div>
        
        <div class="error-msg" id="errorMsg">Spróbuj ponownie. Zaznaczono błędne zdjęcia.</div>

        <div class="footer">
            <div class="footer-icons">
                <button onclick="resetSelection()" title="Zresetuj">↻</button>
            </div>
            <button class="btn-verify" onclick="verifyCaptcha()">Verify</button>
        </div>
    </div>

    <script>
        function toggleSelect(element) {
            element.classList.toggle('selected');
            document.getElementById('errorMsg').style.display = 'none'; // Ukryj błąd po kliknięciu
        }

        function resetSelection() {
            document.querySelectorAll('.img-item').forEach(el => el.classList.remove('selected'));
            document.getElementById('errorMsg').style.display = 'none';
        }

        function verifyCaptcha() {
            let selectedIds = [];
            document.querySelectorAll('.img-item.selected').forEach(el => {
                selectedIds.push(parseInt(el.getAttribute('data-id')));
            });

            selectedIds.sort((a, b) => a - b);
            const correctAnswers = [3, 7, 9];

            if (JSON.stringify(selectedIds) === JSON.stringify(correctAnswers)) {
                window.location.href = 'Poziom2.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                // Prawdziwe reCAPTCHA czyści formularz przy błędzie
                setTimeout(resetSelection, 800); 
            }
        }
    </script>
</body>
</html>
