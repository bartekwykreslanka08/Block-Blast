<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 13 - Perfect Pour</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka One', cursive; touch-action: none; user-select: none; }
        body { background: linear-gradient(135deg, #e8effa 0%, #f2f2f2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; overflow: hidden; }

        .captcha-box { background: #ffffff; width: 92%; max-width: 420px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; }
        
        /* Zaktualizowany header, aby pomieścić przycisk restartu */
        .header { background: linear-gradient(135deg, #4A90E2, #357ABD); color: white; padding: 20px 24px; position: relative; }
        .level-badge { display: inline-block; background: rgba(255, 255, 255, 0.25); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        .header h2 { font-size: 28px; }

        /* Przycisk Restartu */
        .restart-btn { position: absolute; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.2); border: none; color: white; padding: 6px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; transition: background 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .restart-btn:hover { background: rgba(255, 255, 255, 0.4); }

        .game-area { background: #fafafa; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 280px; }
        
        .glass { width: 100px; height: 160px; border: 4px solid #bdc3c7; border-top: none; border-radius: 0 0 12px 12px; position: relative; overflow: hidden; background: white; margin-bottom: 20px; }
        
        .target-line { position: absolute; bottom: 80%; width: 100%; border-bottom: 3px dashed #2ecc71; z-index: 10; }
        
        .water { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: #3498db; transition: background 0.3s; }
        
        .pour-btn { background: #34495e; color: white; border: none; padding: 15px 0; width: 100%; border-radius: 8px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 0 #2c3e50; transition: transform 0.1s, box-shadow 0.1s; display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; }
        .pour-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #2c3e50; }

        .footer { padding: 16px 20px; display: flex; justify-content: center; background: #fff; border-top: 1px solid #eee; }
        .btn-verify { background: linear-gradient(135deg, #4A90E2, #357ABD); color: white; border: none; padding: 14px 36px; font-size: 16px; border-radius: 6px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; transition: opacity 0.3s; }
        .btn-verify:disabled { background: #b3cdef; cursor: not-allowed; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="captcha-box">
        <div class="header">
            <span class="level-badge">Level 13</span>
            <button class="restart-btn" onclick="resetGame()">↺ Restart</button>
            <h2>Pour perfectly</h2>
        </div>
        <div class="game-area">
            <div class="glass">
                <div class="target-line"></div>
                <div class="water" id="water"></div>
            </div>
            <button class="pour-btn" id="pourBtn">💧 HOLD TO POUR</button>
        </div>
        <div class="footer">
            <button class="btn-verify" id="verifyBtn" onclick="finishGame()" disabled>Zakończ grę</button>
        </div>
    </div>

    <script>
        // ZAPIS POSTĘPU: Od razu po wejściu na ten poziom, zapisujemy go
        localStorage.setItem('aktualnyPoziom', '13');

        // FUNKCJA RESTARTU
        function resetGame() {
            if(confirm("Czy na pewno chcesz zresetować cały postęp i zacząć od nowa?")) {
                localStorage.setItem('aktualnyPoziom', '1');
                window.location.href = 'index.html'; // Zmień na swój plik startowy
            }
        }

        const pourBtn = document.getElementById('pourBtn');
        const water = document.getElementById('water');
        const verifyBtn = document.getElementById('verifyBtn');
        
        let fillLevel = 0;
        let fillInterval;
        let isPouring = false;
        let isDone = false;

        function startPour(e) {
            if (e && e.cancelable) e.preventDefault();
            if (isDone || isPouring) return;
            isPouring = true;
            
            water.style.background = '#3498db'; 
            
            fillInterval = setInterval(() => {
                fillLevel += 1; 
                water.style.height = `${fillLevel}%`;
                
                if (fillLevel >= 100) {
                    stopPour();
                }
            }, 15); 
        }

        function stopPour(e) {
            if (!isPouring || isDone) return;
            isPouring = false;
            clearInterval(fillInterval);

            // Tolerancja: cel to 80%, zalicza w przedziale 77% - 83%
            if (fillLevel >= 77 && fillLevel <= 83) {
                water.style.background = '#2ecc71'; 
                pourBtn.style.opacity = '0.5';
                pourBtn.style.pointerEvents = 'none';
                pourBtn.innerText = 'PERFECT!';
                isDone = true;
                verifyBtn.disabled = false;
            } else if (fillLevel > 83) {
                water.style.background = '#e74c3c'; 
                setTimeout(() => {
                    fillLevel = 0;
                    water.style.height = '0%';
                }, 800);
            } else {
                fillLevel = 0;
                water.style.height = '0%';
            }
        }

        pourBtn.addEventListener('mousedown', startPour);
        window.addEventListener('mouseup', stopPour); 

        pourBtn.addEventListener('touchstart', startPour, {passive: false});
        window.addEventListener('touchend', stopPour);

        function finishGame() {
            alert("GRATULACJE! Dotarłeś do końca! Masz świetny refleks. 🏆");
            localStorage.setItem('aktualnyPoziom', '1'); // Automatyczny reset po przejściu gry
            window.location.href = 'index.html'; // Powrót na stronę główną
        }
    </script>
</body>
</html>
