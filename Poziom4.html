<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 4 - Catch Button</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka One', cursive; }
        body { background: linear-gradient(135deg, #e8effa 0%, #f2f2f2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; overflow: hidden; }
        
        .captcha-box { background: #ffffff; width: 92%; max-width: 420px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, #4A90E2, #357ABD); color: white; padding: 20px 24px; }
        .level-badge { display: inline-block; background: rgba(255, 255, 255, 0.25); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        .header p { font-size: 14px; margin-bottom: 4px; font-weight: normal; }
        .header h2 { font-size: 28px; letter-spacing: 1px; }

        .game-area { position: relative; height: 250px; background: #fafafa; overflow: hidden; border-bottom: 1px solid #eee; touch-action: none; }
        .hint-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ccc; font-size: 20px; pointer-events: none; text-align: center; }

        .btn-verify-catch {
            position: absolute; top: 10px; left: 10px; background: linear-gradient(135deg, #4A90E2, #357ABD);
            color: white; border: none; padding: 14px 36px; font-size: 16px; border-radius: 6px; text-transform: uppercase;
            cursor: pointer; transition: box-shadow 0.2s; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3); z-index: 10;
        }
        .btn-verify-catch:hover { box-shadow: 0 6px 15px rgba(74, 144, 226, 0.4); }

        .footer { padding: 16px 20px; display: flex; justify-content: center; align-items: center; background: #fff; height: 60px; }
        .success-msg { color: #0f9d58; font-size: 16px; display: none; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="captcha-box">
        <div class="header">
            <span class="level-badge">Level 4</span>
            <p>Prove you have fast reflexes</p>
            <h2>Click Verify</h2>
        </div>
        <div class="game-area" id="gameArea">
            <div class="hint-text">Catch the moving target!</div>
            <button class="btn-verify-catch" id="catchBtn" onclick="finishLevel()" ontouchstart="finishLevel()">Verify</button>
        </div>
        <div class="footer">
            <div class="success-msg" id="successMsg">Success! Loading Level 5... ⏳</div>
        </div>
    </div>
    <script>
        const catchBtn = document.getElementById('catchBtn');
        const gameArea = document.getElementById('gameArea');
        const successMsg = document.getElementById('successMsg');
        
        let x = 10, y = 10, speedX = 2.5, speedY = 2.5, animationId;

        function animateButton() {
            const areaWidth = gameArea.clientWidth, areaHeight = gameArea.clientHeight;
            const btnWidth = catchBtn.clientWidth, btnHeight = catchBtn.clientHeight;
            const maxX = areaWidth - btnWidth, maxY = areaHeight - btnHeight;

            x += speedX; y += speedY;

            if (x <= 0) { x = 0; speedX *= -1; } else if (x >= maxX) { x = maxX; speedX *= -1; }
            if (y <= 0) { y = 0; speedY *= -1; } else if (y >= maxY) { y = maxY; speedY *= -1; }

            catchBtn.style.left = `${x}px`; catchBtn.style.top = `${y}px`;
            animationId = requestAnimationFrame(animateButton);
        }
        animateButton();

        function finishLevel() {
            cancelAnimationFrame(animationId);
            catchBtn.style.display = 'none'; 
            successMsg.style.display = 'block';
            
            // Przekierowanie do Poziomu 5 po sekundzie
            setTimeout(() => { 
                window.location.href = 'Poziom5.html'; 
            }, 1000);
        }
    </script>
</body>
</html>
