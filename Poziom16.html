<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 16 - Draw a Heart</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka One', cursive; touch-action: none; user-select: none; }
        body { background: linear-gradient(135deg, #e8effa 0%, #f2f2f2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; overflow: hidden;}

        .captcha-box { background: #ffffff; width: 92%; max-width: 420px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; padding: 20px 24px; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .level-badge { display: inline-block; background: rgba(255, 255, 255, 0.25); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
        .btn-reset { background: rgba(255, 255, 255, 0.2); border: none; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: background 0.2s; }
        .btn-reset:hover { background: #333; }
        .header h2 { font-size: 24px; }

        .game-area { background: #fafafa; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .timer-bar { width: 100%; height: 8px; background: #ddd; border-radius: 4px; overflow: hidden; margin-bottom: 15px; }
        .timer-fill { height: 100%; width: 100%; background: #e74c3c; transform-origin: left; }

        #drawArea { background: #fff; border: 2px dashed #bdc3c7; border-radius: 8px; width: 100%; height: 250px; cursor: crosshair; }
        .status { font-size: 18px; margin-top: 15px; color: #7f8c8d; height: 24px; }
        .success-text { color: #2ecc71; }
        .fail-text { color: #e74c3c; }

        .footer { padding: 16px 20px; display: flex; justify-content: center; background: #fff; border-top: 1px solid #eee; }
        .btn-verify { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; border: none; padding: 14px 36px; font-size: 16px; border-radius: 6px; text-transform: uppercase; cursor: pointer; transition: opacity 0.3s; }
        .btn-verify:disabled { background: #b5e8c9; cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="captcha-box">
        <div class="header">
            <div class="header-top">
                <span class="level-badge">Level 16</span>
                <button class="btn-reset" onclick="resetAllProgress()">Reset Game</button>
            </div>
            <h2>Draw a perfect heart in 3s!</h2>
        </div>
        <div class="game-area">
            <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
            <canvas id="drawArea"></canvas>
            <div class="status" id="statusText">Min. 85% accuracy needed</div>
        </div>
        <div class="footer">
            <button class="btn-verify" id="verifyBtn" onclick="goToNextLevel()" disabled>Verify</button>
        </div>
    </div>

    <script>
        localStorage.setItem('aktualnyPoziom', '16');
        function resetAllProgress() { localStorage.setItem('aktualnyPoziom', '1'); window.location.href = 'index.html'; }
        function goToNextLevel() { window.location.href = 'Poziom17.html'; }

        const canvas = document.getElementById('drawArea');
        const ctx = canvas.getContext('2d');
        const timerFill = document.getElementById('timerFill');
        const statusText = document.getElementById('statusText');
        const verifyBtn = document.getElementById('verifyBtn');
        
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        const centerX = canvas.width / 2; const centerY = canvas.height / 2 - 10;

        let isDrawing = false;
        let gameStarted = false;
        let gameOver = false;
        let checkpoints = [];
        let timeRemaining = 3000;
        let lastTime = 0;

        // Generate mathematical heart shape checkpoints
        for (let t = 0; t < Math.PI * 2; t += 0.15) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            checkpoints.push({ x: centerX + x * 6, y: centerY + y * 6, hit: false });
        }

        function drawBase() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            checkpoints.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.closePath();
            ctx.strokeStyle = '#ecf0f1'; ctx.lineWidth = 15; ctx.stroke();
        }

        function startGame(e) {
            if (gameOver) return;
            isDrawing = true;
            if (!gameStarted) {
                gameStarted = true;
                lastTime = performance.now();
                requestAnimationFrame(updateTimer);
            }
            draw(e);
        }

        function stopGame() { isDrawing = false; ctx.beginPath(); }

        function draw(e) {
            if (!isDrawing || gameOver) return;
            let rect = canvas.getBoundingClientRect();
            let x = (e.clientX || e.touches[0].clientX) - rect.left;
            let y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineWidth = 15; ctx.lineCap = 'round'; ctx.strokeStyle = '#e74c3c';
            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);

            // Check collisions
            checkpoints.forEach(p => {
                if (!p.hit && Math.hypot(p.x - x, p.y - y) < 20) p.hit = true;
            });
        }

        function updateTimer(timestamp) {
            if (gameOver) return;
            let dt = timestamp - lastTime;
            lastTime = timestamp;
            timeRemaining -= dt;
            
            let percent = Math.max(0, timeRemaining / 3000);
            timerFill.style.transform = `scaleX(${percent})`;

            if (timeRemaining <= 0) {
                gameOver = true;
                evaluateHeart();
            } else {
                requestAnimationFrame(updateTimer);
            }
        }

        function evaluateHeart() {
            let hitCount = checkpoints.filter(c => c.hit).length;
            let accuracy = Math.round((hitCount / checkpoints.length) * 100);
            
            if (accuracy >= 85) {
                statusText.innerHTML = `<span class="success-text">Accuracy: ${accuracy}% - Perfect!</span>`;
                verifyBtn.disabled = false;
            } else {
                statusText.innerHTML = `<span class="fail-text">Accuracy: ${accuracy}% - Try again!</span>`;
                setTimeout(() => {
                    gameOver = false; gameStarted = false; timeRemaining = 3000;
                    checkpoints.forEach(p => p.hit = false);
                    timerFill.style.transform = `scaleX(1)`;
                    statusText.innerText = "Min. 85% accuracy needed";
                    drawBase();
                }, 1500);
            }
        }

        drawBase();
        canvas.addEventListener('mousedown', startGame); canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopGame); canvas.addEventListener('mouseleave', stopGame);
        canvas.addEventListener('touchstart', startGame); canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopGame);
    </script>
</body>
</html>
