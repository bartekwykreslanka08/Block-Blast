<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 12 - Connect Pipes</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka One', cursive; touch-action: manipulation; user-select: none; }
        body { background: linear-gradient(135deg, #e8effa 0%, #f2f2f2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }

        .captcha-box { background: #ffffff; width: 92%; max-width: 420px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, #4A90E2, #357ABD); color: white; padding: 20px 24px; }
        .level-badge { display: inline-block; background: rgba(255, 255, 255, 0.25); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        .header h2 { font-size: 28px; }

        .game-area { background: #fafafa; padding: 30px 20px; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* Strzałki wejścia i wyjścia */
        .arrow-in { position: absolute; left: 10px; top: 40px; font-size: 24px; color: #3498db; }
        .arrow-out { position: absolute; right: 10px; bottom: 40px; font-size: 24px; color: #3498db; }

        .grid { display: grid; grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(2, 70px); gap: 2px; background: #ddd; border: 2px solid #ddd; border-radius: 8px; overflow: hidden; }
        
        .cell { width: 70px; height: 70px; background: white; cursor: pointer; position: relative; display: flex; justify-content: center; align-items: center; }
        .cell:active { background: #f0f0f0; }

        /* Konstrukcja rur w CSS */
        .pipe { position: absolute; background: #3498db; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .pipe-straight .bar { width: 100%; height: 24px; background: inherit; position: absolute; top: 23px; left: 0; }
        .pipe-corner .bar1 { width: 47px; height: 24px; background: inherit; position: absolute; top: 23px; left: 23px; border-radius: 12px 0 0 0; }
        .pipe-corner .bar2 { width: 24px; height: 47px; background: inherit; position: absolute; top: 23px; left: 23px; border-radius: 12px 0 0 0; }
        
        /* Środek rury (estetyczne koło na złączeniu) */
        .pipe-corner::after { content: ''; position: absolute; width: 24px; height: 24px; background: #3498db; border-radius: 50%; top: 23px; left: 23px; }

        .success .pipe { background: #2ecc71; } /* Kolor po wygranej */

        .footer { padding: 16px 20px; display: flex; justify-content: center; background: #fff; border-top: 1px solid #eee; }
        .btn-verify { background: linear-gradient(135deg, #4A90E2, #357ABD); color: white; border: none; padding: 14px 36px; font-size: 16px; border-radius: 6px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; transition: opacity 0.3s; }
        .btn-verify:disabled { background: #b3cdef; cursor: not-allowed; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="captcha-box">
        <div class="header">
            <span class="level-badge">Level 12</span>
            <h2>Connect the flow</h2>
        </div>
        <div class="game-area">
            <div class="arrow-in">▶</div>
            <div class="grid" id="grid">
                <!-- Rury wygenerowane przez JS -->
            </div>
            <div class="arrow-out">▶</div>
        </div>
        <div class="footer">
            <button class="btn-verify" id="verifyBtn" onclick="goToNextLevel()" disabled>Verify</button>
        </div>
    </div>

    <script>
        const gridEl = document.getElementById('grid');
        const verifyBtn = document.getElementById('verifyBtn');
        let isDone = false;

        // Typ 0 = prosta, Typ 1 = zakręt
        // Target to wymagany kąt obrotu aby woda płynęła
        const levelData = [
            { id: 0, type: 0, startRot: 90, targetRot: [0, 180] }, // Top-Left: Prosta (musi iść wprawo)
            { id: 1, type: 1, startRot: 180, targetRot: [90] },    // Top-Mid: Zakręt (musi łączyć Lewo-Dół, czyli 90st)
            { id: 2, type: 1, startRot: 0, targetRot: [] },      // Top-Right: Mylący zakręt (dowolny kąt)
            { id: 3, type: 1, startRot: 90, targetRot: [] },     // Bot-Left: Mylący zakręt (dowolny kąt)
            { id: 4, type: 1, startRot: 0, targetRot: [270] },     // Bot-Mid: Zakręt (musi łączyć Góra-Prawo, czyli 270st)
            { id: 5, type: 0, startRot: 90, targetRot: [0, 180] }  // Bot-Right: Prosta (musi łączyć Lewo-Prawo)
        ];

        let pipes = [];

        levelData.forEach((data, index) => {
            let cell = document.createElement('div');
            cell.className = 'cell';
            
            let pipeWrapper = document.createElement('div');
            pipeWrapper.className = data.type === 0 ? 'pipe pipe-straight' : 'pipe pipe-corner';
            pipeWrapper.style.width = '100%';
            pipeWrapper.style.height = '100%';
            
            if (data.type === 0) {
                pipeWrapper.innerHTML = '<div class="bar"></div>';
            } else {
                pipeWrapper.innerHTML = '<div class="bar1"></div><div class="bar2"></div>';
            }

            // Ustawienie początkowej rotacji
            data.currentRot = data.startRot;
            pipeWrapper.style.transform = `rotate(${data.currentRot}deg)`;

            cell.appendChild(pipeWrapper);
            gridEl.appendChild(cell);

            // Obsługa kliknięcia
            cell.addEventListener('mousedown', () => rotatePipe(index, pipeWrapper));
            cell.addEventListener('touchstart', (e) => { e.preventDefault(); rotatePipe(index, pipeWrapper); });

            pipes.push({ data: data, element: pipeWrapper });
        });

        function rotatePipe(index, element) {
            if (isDone) return;
            let pipe = pipes[index].data;
            pipe.currentRot += 90;
            element.style.transform = `rotate(${pipe.currentRot}deg)`;
            
            setTimeout(checkWin, 200); // Check after animation starts
        }

        function checkWin() {
            let won = true;
            for (let i = 0; i < pipes.length; i++) {
                let p = pipes[i].data;
                if (p.targetRot.length > 0) {
                    // Normalizuj rotację do 0, 90, 180, 270
                    let normalized = p.currentRot % 360;
                    if (!p.targetRot.includes(normalized)) {
                        won = false;
                        break;
                    }
                }
            }

            if (won) {
                isDone = true;
                gridEl.classList.add('success');
                verifyBtn.disabled = false;
            }
        }

        function goToNextLevel() { window.location.href = 'Poziom13.html'; }
    </script>
</body>
</html>
