<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 12 - Signal Tuning</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka One', cursive; touch-action: manipulation; user-select: none; }
        body { background: linear-gradient(135deg, #e8effa 0%, #f2f2f2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; overflow: hidden; }

        .captcha-box { background: #ffffff; width: 92%; max-width: 420px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; transition: box-shadow 0.4s ease; }
        .success.captcha-box { box-shadow: 0 15px 35px rgba(46, 204, 113, 0.25); }
        
        .header { background: linear-gradient(135deg, #2c3e50, #34495e); color: white; padding: 20px 24px; transition: background 0.4s ease; position: relative; }
        .success .header { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .level-badge { display: inline-block; background: rgba(255, 255, 255, 0.25); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
        
        .btn-reset { background: rgba(255, 255, 255, 0.2); border: none; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: background 0.2s, transform 0.1s; letter-spacing: 0.5px; }
        .btn-reset:hover { background: #e74c3c; }
        .btn-reset:active { transform: scale(0.95); }
        
        .header h2 { font-size: 24px; letter-spacing: 0.5px; }

        .footer { padding: 16px 20px; display: flex; justify-content: center; background: #fff; border-top: 1px solid #eee; }
        .btn-verify { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; border: none; padding: 14px 36px; font-size: 16px; border-radius: 6px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; transition: all 0.3s; }
        .btn-verify:disabled { background: #b5e8c9; cursor: not-allowed; color: rgba(255,255,255,0.7); box-shadow: none; transform: none; }
        .btn-verify:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); }
        .btn-verify:not(:disabled):active { transform: translateY(0); }

        
        .game-area { background: #fafafa; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .oscilloscope-container { width: 100%; height: 160px; background: #111; border-radius: 8px; box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 4px 10px rgba(0,0,0,0.05); position: relative; overflow: hidden; border: 2px solid #2c3e50; transition: border-color 0.4s, box-shadow 0.4s; }
        .success .oscilloscope-container { border-color: #2ecc71; box-shadow: 0 0 20px rgba(46, 204, 113, 0.4), inset 0 0 15px rgba(0,0,0,0.8); }
        canvas { display: block; width: 100%; height: 100%; }

        .controls { display: flex; flex-direction: column; gap: 15px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-group label { font-size: 14px; color: #555; display: flex; justify-content: space-between; }
        .control-group label span { color: #3498db; transition: color 0.3s; }
        .success .control-group label span { color: #2ecc71; }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #ddd; border-radius: 4px; transition: background 0.3s; }
        input[type=range]::-webkit-slider-thumb { height: 24px; width: 24px; border-radius: 50%; background: #3498db; cursor: pointer; -webkit-appearance: none; margin-top: -8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: transform 0.1s, background 0.3s; }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.1); }
        
        .success input[type=range]::-webkit-slider-thumb { background: #2ecc71; cursor: default; }

    </style>
</head>
<body>
    <div class="captcha-box" id="app">
        <div class="header">
            <div class="header-top">
                <span class="level-badge">Level 12</span>
                <button class="btn-reset" onclick="resetAllProgress()">Reset Game</button>
            </div>
            <h2>Match the Signal</h2>
            
        </div>
        <div class="game-area" >
            
            <div class="oscilloscope-container" id="screen">
                <canvas id="oscCanvas"></canvas>
            </div>
            <div class="controls">
                <div class="control-group">
                    <label>Frequency <span id="freqVal">--</span></label>
                    <input type="range" id="freqSlider" min="10" max="80" value="10" step="1">
                </div>
                <div class="control-group">
                    <label>Amplitude <span id="ampVal">--</span></label>
                    <input type="range" id="ampSlider" min="10" max="60" value="10" step="1">
                </div>
            </div>

        </div>
        <div class="footer">
            <button class="btn-verify" id="verifyBtn" onclick="goToNextLevel()" disabled>Verify</button>
        </div>
    </div>

    <script>
        function resetAllProgress() {
            localStorage.setItem('aktualnyPoziom', '1');
            window.location.href = 'index.html';
        }
        function goToNextLevel() { 
            localStorage.setItem('aktualnyPoziom', '13');
            window.location.href = 'Poziom13.html'; 
        }

        const app = document.getElementById('app');
        const verifyBtn = document.getElementById('verifyBtn');
        let isDone = false;

        
        const canvas = document.getElementById('oscCanvas');
        const ctx = canvas.getContext('2d');
        const freqSlider = document.getElementById('freqSlider');
        const ampSlider = document.getElementById('ampSlider');
        let phase = 0; 
        const targetFreq = 45; 
        const targetAmp = 40;  

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = `${rect.width}px`;
            canvas.style.height = `${rect.height}px`;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawWave(ctx, freq, amp, color, phaseOffset, lineWidth, width, height) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.lineJoin = 'round';
            const cy = height / 2;
            for (let x = 0; x <= width; x++) {
                const y = cy + Math.sin((x / width) * (freq / 10) * Math.PI * 2 + phaseOffset) * amp;
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function drawGrid(width, height) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = 0; x < width; x += 20) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
            for (let y = 0; y < height; y += 20) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.beginPath();
            ctx.moveTo(0, height / 2);
            ctx.lineTo(width, height / 2);
            ctx.stroke();
        }

        function animate() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;
            ctx.clearRect(0, 0, w, h);
            drawGrid(w, h);

            let currentFreq = parseFloat(freqSlider.value);
            let currentAmp = parseFloat(ampSlider.value);

            if (!isDone) {
                const freqDiff = Math.abs(currentFreq - targetFreq);
                const ampDiff = Math.abs(currentAmp - targetAmp);
                
                if (freqDiff <= 2 && ampDiff <= 2) {
                    currentFreq = targetFreq;
                    currentAmp = targetAmp;
                    freqSlider.value = targetFreq;
                    ampSlider.value = targetAmp;
                    
                    isDone = true;
                    freqSlider.disabled = true;
                    ampSlider.disabled = true;
                    verifyBtn.disabled = false;
                    app.classList.add('success');
                }
            }

            document.getElementById('freqVal').innerText = currentFreq + " Hz";
            document.getElementById('ampVal').innerText = currentAmp + " dB";

            drawWave(ctx, targetFreq, targetAmp, 'rgba(255, 255, 255, 0.3)', phase, 2, w, h);
            const playerColor = isDone ? '#2ecc71' : '#3498db';
            drawWave(ctx, currentFreq, currentAmp, playerColor, phase, 3, w, h);

            phase += 0.08;
            requestAnimationFrame(animate);
        }

        animate();

    </script>
</body>
</html>
