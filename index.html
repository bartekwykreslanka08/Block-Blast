<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weryfikacja</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka One', cursive; }
        body { 
            background: linear-gradient(135deg, #e8effa 0%, #f2f2f2 100%); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: #333;
        }
        
        .recaptcha-widget {
            background: #ffffff; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            display: flex; align-items: center; padding: 0 16px; width: 320px; height: 84px;
            cursor: pointer; transition: all 0.3s ease; border: 1px solid transparent;
        }
        .recaptcha-widget:hover { box-shadow: 0 12px 28px rgba(0,0,0,0.12); transform: translateY(-2px); }
        
        .checkbox-container {
            width: 30px; height: 30px; background: #fff; border: 2px solid #c1c1c1;
            border-radius: 4px; margin-right: 18px; display: flex; justify-content: center; align-items: center;
            transition: 0.2s;
        }
        .recaptcha-widget:hover .checkbox-container { border-color: #4A90E2; }
        
        .label { font-size: 15px; color: #222; flex-grow: 1; letter-spacing: 0.3px; }
        
        .logo-container { display: flex; flex-direction: column; align-items: center; margin-top: 4px; }
        .logo-container img { width: 34px; opacity: 0.9; margin-bottom: 2px; }
        .logo-container span { font-size: 10px; color: #777; line-height: 1.3; text-align: center; }
        .logo-container a { color: #777; text-decoration: none; transition: color 0.2s; }
        .logo-container a:hover { color: #4A90E2; text-decoration: underline; }

        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.05); width: 30px; height: 30px; border-radius: 50%;
            border-left-color: #4A90E2; animation: spin 0.8s linear infinite; display: none; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="recaptcha-widget" id="startWidget">
        <div class="checkbox-container" id="checkboxBox">
            <div class="spinner" id="spinner"></div>
        </div>
        <div class="label">I'm not a robot</div>
        <div class="logo-container">
            <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="reCAPTCHA">
            <span>reCAPTCHA<br><a href="#">Privacy</a> - <a href="#">Terms</a></span>
        </div>
    </div>

    <script>
        document.getElementById('startWidget').addEventListener('click', function() {
            const spinner = document.getElementById('spinner');
            const checkboxBox = document.getElementById('checkboxBox');
            
            spinner.style.display = 'block';
            checkboxBox.style.border = 'none';
            checkboxBox.style.background = 'transparent';
            
            let poziom = localStorage.getItem('aktualnyPoziom');
            if (!poziom) {
                poziom = '6'; // Zaczynamy od 6 zgodnie z Twoimi plikami (zmień na 1 jeśli masz poprzednie)
                localStorage.setItem('aktualnyPoziom', poziom);
            }
            
            setTimeout(() => { window.location.href = `Poziom${poziom}.html`; }, 1200);
        });
    </script>
</body>
</html>
