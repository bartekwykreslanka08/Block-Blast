<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Generator rozkładu ZM - WTP Warszawa</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
:root{
  --bg:#f3f4f6;
  --panel:#ffffff;
  --ink:#111827;
  --muted:#6b7280;
  --line:#000000;
  --font-ui:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-ticket:"Courier New",Courier,monospace;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-ui);
}

.app{
  display:grid;
  grid-template-columns:420px 1fr;
  min-height:100vh;
}

.editor{
  background:#111827;
  color:#fff;
  padding:24px;
  overflow-y:auto;
  max-height:100vh;
}

.editor h1{
  margin:0 0 6px;
  font-size:24px;
}

.subtitle{
  margin:0 0 24px;
  color:#cbd5e1;
  font-size:14px;
}

.section{
  margin-bottom:24px;
  padding:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:16px;
}

.section h2{
  margin:0 0 14px;
  font-size:16px;
}

label{
  display:block;
  margin:12px 0 6px;
  color:#e5e7eb;
  font-size:13px;
  font-weight:600;
}

input,
textarea,
select{
  width:100%;
  padding:10px 12px;
  border:1px solid #374151;
  border-radius:10px;
  background:#030712;
  color:#fff;
  font-family:var(--font-ui);
  font-size:14px;
}

textarea{
  min-height:88px;
  resize:vertical;
}

.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.buttons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:18px;
}

button{
  border:0;
  border-radius:999px;
  padding:11px 16px;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
}

.btn-primary{
  background:#2563eb;
  color:#fff;
}

.btn-light{
  background:#f9fafb;
  color:#111827;
}

.btn-danger{
  background:#991b1b;
  color:#fff;
}

.preview-wrap{
  padding:28px;
  overflow:auto;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}

.paper{
  width:1000px;
  min-height:720px;
  background:#f8f3c9;
  border:2px solid #000;
  box-shadow:
    0 10px 25px rgba(0,0,0,0.18),
    inset 0 0 0 1px rgba(0,0,0,0.08);
  padding:6px;
  margin:0 auto;
}

.timetable{
  border:3px solid var(--line);
  min-height:700px;
  display:grid;
  grid-template-columns:700px 1fr;
  font-family:"Courier New",monospace;
  color:#000;
  background:#fffef2;
  letter-spacing:-0.3px;
}

.left-side{
  border-right:3px solid var(--line);
  display:grid;
  grid-template-rows:145px 1fr 92px;
}

.header{
  display:grid;
  grid-template-columns:205px 1fr;
  border-bottom:3px solid var(--line);
}

.line-box{
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:3px solid var(--line);
  background:#fff;
}

.line-number{
  font-family:Arial Black,Arial,sans-serif;
  font-size:96px;
  font-weight:900;
  line-height:1;
  letter-spacing:-8px;
  color:#000;
}

.route-box{
  padding:18px;
  text-transform:uppercase;
  background:
    linear-gradient(to bottom,
      rgba(0,0,0,0.03),
      rgba(0,0,0,0));
}

.label{
  font-size:13px;
  letter-spacing:1px;
}

.route-main{
  margin-top:8px;
  font-size:16px;
  font-weight:700;
}

.route-date{
  margin-top:18px;
  font-size:13px;
}

.hours-area{
  display:grid;
  grid-template-columns:205px 205px 1fr;
}

.hours-col{
  border-right:3px solid var(--line);
}

.hours-title{
  min-height:54px;
  padding:9px 8px;
  border-bottom:3px solid var(--line);
  text-align:center;
  font-size:13px;
  font-weight:900;
  background:rgba(0,0,0,0.03);
}

.hour-table{
  padding:8px 10px;
}

.hour-row{
  display:grid;
  grid-template-columns:28px 1fr;
  min-height:20px;
  border-bottom:1px solid #d6d6d6;
  align-items:center;
  padding:1px 0;
}

.hour{
  font-size:15px;
  font-weight:900;
}

.minutes{
  font-size:15px;
  letter-spacing:1px;
}

.notes-area{
  padding:18px 16px;
  font-size:13px;
  line-height:1.5;
}

.footer-note{
  border-top:3px solid var(--line);
  padding:14px 18px;
  font-size:14px;
  background:rgba(0,0,0,0.03);
  font-weight:700;
}

.right-side{
  display:grid;
  grid-template-rows:54px 1fr;
}

.right-top{
  padding:8px 10px;
  border-bottom:3px solid var(--line);
  font-size:11px;
  background:rgba(0,0,0,0.04);
}

.stops-panel{
  padding:8px 10px 12px;
  position:relative;
}

.tariff{
  text-align:center;
  font-size:12px;
  margin-bottom:8px;
  font-weight:700;
}

.direction{
  text-align:center;
  font-size:13px;
  margin-bottom:8px;
  font-weight:700;
}

.stops{
  position:relative;
  padding-left:34px;
  margin-top:10px;
}

.stops::before{
  content:"";
  position:absolute;
  left:15px;
  top:4px;
  bottom:4px;
  border-left:3px solid #000;
}

.stop{
  position:relative;
  min-height:25px;
  display:grid;
  grid-template-columns:1fr auto;
  column-gap:8px;
  align-items:start;
  font-size:12px;
  line-height:1.1;
  color:#222;
}

.stop::before{
  content:"";
  position:absolute;
  left:-25px;
  top:4px;
  width:8px;
  height:8px;
  background:#000;
  border-radius:50%;
}

.stop.current{
  font-weight:900;
  font-size:13px;
}

.stop.current::before{
  width:16px;
  height:16px;
  left:-29px;
  top:0;
}

.stop-name{
  text-transform:uppercase;
}

.zone{
  font-size:11px;
  color:#444;
}

.vertical-meta{
  position:absolute;
  left:-8px;
  bottom:12px;
  transform:rotate(-90deg);
  transform-origin:left bottom;
  font-size:10px;
  white-space:nowrap;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:5px 9px;
  border-radius:999px;
  background:#ecfdf5;
  color:#065f46;
  font-size:12px;
  font-weight:700;
}

.no-service{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:310px;
  padding:20px;
  font-size:17px;
  font-weight:700;
  text-align:center;
}

.timetable *{
  image-rendering:crisp-edges;
}

@media(max-width:1100px){
  .app{
    grid-template-columns:1fr;
  }

  .editor{
    max-height:none;
  }
}

@media print{
  body{
    background:#fff;
  }

  .editor,
  .topbar{
    display:none!important;
  }

  .paper{
    width:100%;
    border:0;
    box-shadow:none;
  }

  @page{
    size:A4 landscape;
    margin:7mm;
  }
}
</style>
</head>

<body>

<main class="app">

<aside class="editor">

<h1>Generator rozkładu ZM</h1>
<p class="subtitle">
Profesjonalny generator realistycznych rozkładów WTP/ZTM.
</p>

<section class="section">

<h2>Dane linii</h2>

<div class="grid-2">

<div>
<label>Numer linii</label>
<input id="lineNumber" value="ZM">
</div>

<div>
<label>Obowiązuje od</label>
<input id="validFrom" value="2025-01-01">
</div>

</div>

<label>Relacja</label>
<input id="routeTitle" value="GRODZISK MAZ. przez MILANÓWEK">

<label>Opis</label>
<input id="variant" value="LINIA ZASTĘPCZA">

<label>Opis techniczny</label>
<input id="rightHeader" value="czasy, trasa, przystanki">

</section>

<section class="section">

<h2>Godziny</h2>

<label>Kolumna 1</label>
<input id="weekdayTitle" value="DZIEŃ POWSZEDNI&#10;Godz. Minuty">

<label>Godziny</label>

<textarea id="weekdayHours">5 | 29 51
6 | 16 32 51
7 | 06 26 36 51
8 | 06 23 36
9 | 01 21
15 | 01 21 36 46
16 | 06 21 36 51</textarea>

<label>Kolumna 2</label>
<input id="holidayTitle" value="ŚWIĘTO I SOBOTA&#10;Godz. Minuty">

<label>Godziny</label>

<textarea id="holidayHours">NIE KURSUJE</textarea>

</section>

<section class="section">

<h2>Przystanki</h2>

<label>Taryfa</label>

<input id="tariff" value="===== TYLKO TARYFA KM =====">

<label>Kierunek</label>

<input id="direction" value="PKP GRODZISK MAZOWIECKI">

<label>Lista przystanków</label>

<textarea id="stopsInput" style="min-height:220px;">PKP GRODZISK MAZOWIECKI | 2
ZONDKA |
Nadarzyńska |
Kościuszki |
Sienkiewicza |
15 STYCZNIA | 2
Królewska |
3 MAJA | 2
MILANÓWEK |
WOJSKA POLSKIEGO | 2
DĘBOWA |
GRODZISK MAZOWIECKI |</textarea>

<label>Aktualny przystanek</label>

<input id="currentStop" value="DĘBOWA">

</section>

<section class="section">

<h2>Komunikaty</h2>

<label>Komunikat środkowy</label>

<textarea id="notes">WSZYSTKIE KURSY REALIZOWANE POJAZDAMI NISKOPODŁOGOWYMI</textarea>

<label>Komunikat dolny</label>

<textarea id="footer">NA LINII ZM OBOWIĄZUJE TYLKO TARYFA KOLEI MAZOWIECKICH</textarea>

<label>Opis boczny</label>

<input id="meta" value="Przystanek: 4086 DĘBOWA 02 MILANÓWEK">

</section>

<section class="section">

<h2>Wygląd</h2>

<div class="buttons">

<button class="btn-primary" onclick="renderTimetable()">
Odśwież
</button>

<button class="btn-light" onclick="window.print()">
Drukuj / PDF
</button>

<button class="btn-primary" onclick="downloadTimetable()">
Pobierz PNG
</button>

<button class="btn-danger" onclick="resetExample()">
Reset
</button>

</div>

</section>

</aside>

<section class="preview-wrap">

<div class="topbar">

<div>
<h2>Podgląd rozkładu</h2>
</div>

<span class="badge">
Tryb edycji aktywny
</span>

</div>

<div class="paper" id="paper">

<article class="timetable">

<section class="left-side">

<header class="header">

<div class="line-box">
<div class="line-number" id="outLineNumber">ZM</div>
</div>

<div class="route-box">

<div class="label" id="outVariant">
LINIA ZASTĘPCZA
</div>

<div class="route-main">
→ <span id="outRouteTitle"></span>
</div>

<div class="route-date">
Rozkład ważny od
<span id="outValidFrom"></span>
</div>

</div>

</header>

<section class="hours-area">

<div class="hours-col">

<div class="hours-title" id="outWeekdayTitle"></div>

<div class="hour-table" id="outWeekdayHours"></div>

</div>

<div class="hours-col">

<div class="hours-title" id="outHolidayTitle"></div>

<div class="hour-table" id="outHolidayHours"></div>

</div>

<div class="notes-area">
<strong id="outNotes"></strong>
</div>

</section>

<footer class="footer-note" id="outFooter"></footer>

</section>

<aside class="right-side">

<div class="right-top" id="outRightHeader"></div>

<div class="stops-panel">

<div class="tariff" id="outTariff"></div>

<div class="direction" id="outDirection"></div>

<div class="stops" id="outStops"></div>

<div class="vertical-meta" id="outMeta"></div>

</div>

</aside>

</article>

</div>

</section>

</main>

<script>

const $ = (id) => document.getElementById(id);

function escapeHtml(value){
  return String(value)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function parseHours(value){

  const trimmed = value.trim();

  if(trimmed.toUpperCase().includes("NIE KURSUJE")){
    return `<div class="no-service">NIE KURSUJE</div>`;
  }

  return trimmed
    .split("\n")
    .map(line=>{

      const [hour,minutes=""] =
        line.split("|").map(x=>x.trim());

      return `
        <div class="hour-row">
          <div class="hour">${hour}</div>
          <div class="minutes">${minutes}</div>
        </div>
      `;
    })
    .join("");
}

function parseStops(value,currentStop){

  const current = currentStop.trim().toUpperCase();

  return value
    .split("\n")
    .map(x=>x.trim())
    .filter(Boolean)
    .map(line=>{

      const [nameRaw,zoneRaw=""] = line.split("|");

      const name = nameRaw.trim();
      const zone = zoneRaw.trim();

      const isCurrent =
        name.toUpperCase() === current;

      return `
        <div class="stop ${isCurrent ? "current" : ""}">
          <div class="stop-name">${escapeHtml(name)}</div>
          <div class="zone">${escapeHtml(zone)}</div>
        </div>
      `;
    })
    .join("");
}

function renderTimetable(){

  $("outLineNumber").textContent =
    $("lineNumber").value;

  $("outVariant").innerHTML =
    $("variant").value;

  $("outRouteTitle").textContent =
    $("routeTitle").value;

  $("outValidFrom").textContent =
    $("validFrom").value;

  $("outWeekdayTitle").innerHTML =
    $("weekdayTitle").value.replaceAll("\n","<br>");

  $("outWeekdayHours").innerHTML =
    parseHours($("weekdayHours").value);

  $("outHolidayTitle").innerHTML =
    $("holidayTitle").value.replaceAll("\n","<br>");

  $("outHolidayHours").innerHTML =
    parseHours($("holidayHours").value);

  $("outTariff").innerHTML =
    $("tariff").value.replaceAll("\n","<br>");

  $("outDirection").innerHTML =
    $("direction").value.replaceAll("\n","<br>");

  $("outStops").innerHTML =
    parseStops(
      $("stopsInput").value,
      $("currentStop").value
    );

  $("outNotes").innerHTML =
    $("notes").value.replaceAll("\n","<br>");

  $("outFooter").innerHTML =
    $("footer").value.replaceAll("\n","<br>");

  $("outMeta").textContent =
    $("meta").value;
}

async function downloadTimetable(){

  const paper =
    document.getElementById("paper");

  const canvas =
    await html2canvas(paper,{
      scale:3,
      useCORS:true,
      backgroundColor:"#f8f3c9"
    });

  const link =
    document.createElement("a");

  link.download =
    `${$("lineNumber").value || "rozkład"}.png`;

  link.href =
    canvas.toDataURL("image/png");

  link.click();
}

function resetExample(){
  location.reload();
}

renderTimetable();

</script>

</body>
</html>
