<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udowodnij, że jesteś człowiekiem</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: #333;
        }
        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
        }
        .logo { font-size: 3rem; margin-bottom: 10px; }
        h1 { font-size: 1.8rem; margin-bottom: 15px; font-weight: 600; }
        p { color: #666; margin-bottom: 30px; font-size: 0.95rem; line-height: 1.5; }
        .btn-start {
            display: inline-block;
            background-color: #4285F4;
            color: white;
            text-decoration: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.4);
        }
        .btn-start:hover {
            background-color: #3367D6;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(66, 133, 244, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">🤖</div>
        <h1>Test Człowieczeństwa</h1>
        <p>Witaj, rzekomy człowieku. Aby kontynuować, musisz ukończyć serię naszych całkowicie logicznych i nieabsurdalnych testów.</p>
        <a href="Poziom1.html" class="btn-start">Start</a>
    </div>

</body>
</html>
