<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 6 - Hold to Verify</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka One', cursive; touch-action: none; }
        body { background: linear-gradient(135deg, #e8effa 0%, #f2f2f2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; overflow: hidden; }

        .captcha-box { background: #ffffff; width: 92%; max-width: 420px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .header { background: linear-gradient(135deg, #4A90E2, #357ABD); color: white; padding: 20px 24px; }
        .level-badge { display: inline-block; background: rgba(255, 255, 255, 0.25); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        .header h2 { font-size: 28px; }

        .game-area { position: relative; height: 220px; background: #fafafa; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        
        #holdBtn {
            width: 120px; height: 120px; border-radius: 50%;
            background: conic-gradient(#4A90E2 0deg, #e0e0e0 0deg);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            user-select: none; transition: transform 0.1s; position: relative;
        }
        #holdBtn::before {
            content: "HOLD"; background: white; width: 105px; height: 105px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 18px; color: #4A90E2; font-weight: bold;
        }
        #holdBtn:active { transform: scale(0.95); }

        #verifyBtn { 
            background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; border: none; padding: 14px 36px; font-size: 16px; border-radius: 6px; 
            text-transform: uppercase; cursor: pointer; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); 
            display: none; 
        }
    </style>
</head>
<body>
    <div class="captcha-box">
        <div class="header">
            <span class="level-badge">Level 6</span>
            <h2>Hold to verify</h2>
        </div>
        <div class="game-area">
            <div id="holdBtn"></div>
            <button id="verifyBtn" onclick="goToNextLevel()">Next Level</button>
        </div>
    </div>

    <script>
        const holdBtn = document.getElementById("holdBtn");
        const verifyBtn = document.getElementById("verifyBtn");
        
        let progress = 0;
        let timer;
        let isDone = false;

        function startLoading(e) {
            if (e && e.cancelable) e.preventDefault();
            if (isDone) return;
            timer = setInterval(() => {
                progress += 2;
                updateUI();
                if (progress >= 100) complete();
            }, 20);
        }

        function stopLoading() {
            if (isDone) return;
            clearInterval(timer);
            progress = 0;
            updateUI();
        }

        function updateUI() {
            holdBtn.style.background = `conic-gradient(#4A90E2 ${progress * 3.6}deg, #e0e0e0 0deg)`;
        }

        function complete() {
            isDone = true;
            clearInterval(timer);
            holdBtn.style.display = "none";
            verifyBtn.style.display = "block";
        }

        holdBtn.addEventListener("mousedown", startLoading);
        holdBtn.addEventListener("mouseup", stopLoading);
        holdBtn.addEventListener("mouseleave", stopLoading);

        holdBtn.addEventListener("touchstart", startLoading, {passive: false});
        holdBtn.addEventListener("touchend", stopLoading);

        function goToNextLevel() { 
            localStorage.setItem('aktualnyPoziom', '7');
            window.location.href = 'Poziom7.html'; 
        }
    </script>
</body>
</html>
