<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 22 - Insert Coin</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka One', cursive; touch-action: none; user-select: none; }
        body { background: linear-gradient(135deg, #e8effa 0%, #f2f2f2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }

        .captcha-box { background: #ffffff; width: 92%; max-width: 420px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; display: flex; flex-direction: column; transition: box-shadow 0.3s; }
        .success.captcha-box { box-shadow: 0 15px 35px rgba(46, 204, 113, 0.2); }
        
        .header { background: linear-gradient(135deg, #2c3e50, #34495e); color: white; padding: 20px 24px; transition: background 0.3s; }
        .success .header { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .level-badge { display: inline-block; background: rgba(255, 255, 255, 0.25); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; text-transform: uppercase; }
        .btn-reset { background: rgba(255, 255, 255, 0.2); border: none; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: background 0.2s; }
        
        .game-area { background: #fafafa; padding: 30px 20px; position: relative; display: flex; flex-direction: column; align-items: center; height: 350px; }
        .instructions { font-size: 14px; color: #7f8c8d; text-align: center; margin-bottom: 30px; }

        .slot-container { width: 120px; height: 80px; background: #bdc3c7; border-radius: 10px; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 5px 15px rgba(0,0,0,0.1); position: relative; z-index: 2; }
        .slot { width: 80px; height: 12px; background: #2c3e50; border-radius: 6px; box-shadow: inset 0 3px 6px rgba(0,0,0,0.5); }
        
        .coin { width: 60px; height: 60px; background: radial-gradient(circle, #f1c40f, #f39c12); border-radius: 50%; position: absolute; bottom: 30px; border: 4px solid #e67e22; box-shadow: 0 8px 15px rgba(0,0,0,0.2); cursor: grab; display: flex; justify-content: center; align-items: center; font-size: 24px; color: #d35400; font-weight: bold; z-index: 3; transition: transform 0.1s; }
        .coin::after { content: '$'; }
        .coin.dragging { cursor: grabbing; transform: scale(1.1); box-shadow: 0 15px 25px rgba(0,0,0,0.3); transition: none; }
        .coin.inserted { animation: insertCoin 0.5s forwards; }

        @keyframes insertCoin {
            0% { transform: scale(1) perspective(500px) rotateX(0deg); opacity: 1; z-index: 1; }
            100% { transform: scale(0.5) perspective(500px) rotateX(70deg) translateY(-80px); opacity: 0; z-index: 1; }
        }

        .footer { padding: 16px 20px; display: flex; justify-content: center; background: #fff; border-top: 1px solid #eee; }
        .btn-verify { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; border: none; padding: 14px 36px; font-size: 16px; border-radius: 6px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
        .btn-verify:disabled { background: #b5e8c9; cursor: not-allowed; color: rgba(255,255,255,0.7); }
        .btn-verify:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); }
    </style>
</head>
<body>
    <div class="captcha-box" id="app">
        <div class="header">
            <div class="header-top">
                <span class="level-badge">Level 22</span>
                <button class="btn-reset" onclick="resetAllProgress()">Reset Game</button>
            </div>
            <h2>Insert Coin</h2>
        </div>
        <div class="game-area" id="gameArea">
            <p class="instructions">Drag the coin into the narrow slot.</p>
            
            <div class="slot-container" id="slotBox">
                <div class="slot" id="targetSlot"></div>
            </div>

            <div class="coin" id="coin"></div>
        </div>
        <div class="footer">
            <button class="btn-verify" id="verifyBtn" onclick="goToNextLevel()" disabled>Verify</button>
        </div>
    </div>

    <script>
        function resetAllProgress() { localStorage.setItem('aktualnyPoziom', '1'); window.location.href = 'index.html'; }
        function goToNextLevel() { localStorage.setItem('aktualnyPoziom', '23'); window.location.href = 'Poziom23.html'; }

        const coin = document.getElementById('coin');
        const targetSlot = document.getElementById('targetSlot');
        const gameArea = document.getElementById('gameArea');
        const app = document.getElementById('app');
        const verifyBtn = document.getElementById('verifyBtn');

        let isDone = false;
        let isDragging = false;
        let offsetX = 0, offsetY = 0;

        coin.addEventListener('mousedown', startDrag);
        coin.addEventListener('touchstart', startDrag);
        window.addEventListener('mousemove', drag);
        window.addEventListener('touchmove', drag);
        window.addEventListener('mouseup', stopDrag);
        window.addEventListener('touchend', stopDrag);

        function startDrag(e) {
            if (isDone) return;
            isDragging = true;
            coin.classList.add('dragging');
            const rect = coin.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            offsetX = clientX - rect.left;
            offsetY = clientY - rect.top;
        }

        function drag(e) {
            if (!isDragging || isDone) return;
            const areaRect = gameArea.getBoundingClientRect();
            let clientX = e.clientX || (e.touches && e.touches[0].clientX);
            let clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            let newLeft = clientX - areaRect.left - offsetX;
            let newTop = clientY - areaRect.top - offsetY;

            coin.style.left = `${newLeft}px`;
            coin.style.top = `${newTop}px`;
            coin.style.bottom = 'auto';

            checkSlotIntersection();
        }

        function checkSlotIntersection() {
            const coinRect = coin.getBoundingClientRect();
            const slotRect = targetSlot.getBoundingClientRect();
            
            // Check if coin is directly over the slot
            const isIntersecting = (
                coinRect.left < slotRect.right &&
                coinRect.right > slotRect.left &&
                coinRect.top < slotRect.bottom &&
                coinRect.bottom > slotRect.top
            );

            if(isIntersecting) {
                isDragging = false;
                isDone = true;
                coin.classList.remove('dragging');
                coin.classList.add('inserted');
                
                // Align to slot for visual drop
                const areaRect = gameArea.getBoundingClientRect();
                coin.style.left = `${slotRect.left - areaRect.left + 10}px`; 
                coin.style.top = `${slotRect.top - areaRect.top}px`;

                setTimeout(() => {
                    app.classList.add('success');
                    verifyBtn.disabled = false;
                }, 500);
            }
        }

        function stopDrag() {
            if (!isDragging || isDone) return;
            isDragging = false;
            coin.classList.remove('dragging');
        }
    </script>
</body>
</html>
